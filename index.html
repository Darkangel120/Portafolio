    <!-- ═══════════════════════════════════════════
         DATOS ESTRUCTURADOS (Schema.org / JSON-LD)

    ═══════════════════════════════════════════ -->

    <!-- 1. Person – quién eres -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "@id": "https://darkangel120.github.io/Portafolio/#person",
      "name": "Oswaldo Gómez",
      "alternateName": "Darkangel120",
      "email": "dark_angel_12011@hotmail.com",
      "url": "https://darkangel120.github.io/Portafolio/",
      "image": {
        "@type": "ImageObject",
        "url": "https://darkangel120.github.io/Portafolio/assets/img/foto.webp",
        "width": 200,
        "height": 200
      },
      "sameAs": [
        "https://github.com/Darkangel120",
        "https://www.linkedin.com/in/oswaldo-rafael-g%C3%B3mez-mata-5b6570383"
      ],
      "jobTitle": "Desarrollador Web Freelance",
      "description": "Desarrollador web especializado en frontend y backend, con experiencia en JavaScript, HTML, CSS y más.",
      "knowsAbout": ["Desarrollo web", "Frontend", "Backend", "JavaScript", "HTML", "CSS"],
      "hasOccupation": {
        "@type": "Occupation",
        "name": "Desarrollador Web",
        "occupationLocation": {
          "@type": "Country",
          "name": "Venezuela"
        }
      }
    }
    </script>

      "inLanguage": ["es", "en"],
      "author": {
        "@id": "https://darkangel120.github.io/Portafolio/#person"
      }
    }
    </script>

    <!-- 3. WebPage – página principal -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfilePage",
      "@id": "https://darkangel120.github.io/Portafolio/#webpage",
      "url": "https://darkangel120.github.io/Portafolio/",

      "description": "Portafolio de Oswaldo Gómez, desarrollador web freelance con proyectos, habilidades técnicas y experiencia laboral.",
      "isPartOf": { "@id": "https://darkangel120.github.io/Portafolio/#website" },
      "about": { "@id": "https://darkangel120.github.io/Portafolio/#person" },
      "datePublished": "2024-01-01",
      "dateModified": "2025-03-01",
      "inLanguage": "es",
      "breadcrumb": {
        "@type": "BreadcrumbList",
        "itemListElement": [
          {
            "@type": "ListItem",
            "position": 1,
            "name": "Inicio",
            "item": "https://darkangel120.github.io/Portafolio/"
          }
        ]
      }
    }
    </script>

    <!-- 4. ItemList – secciones del portafolio (ayuda a Google a indexar anclas) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ItemList",

      "itemListElement": [
        { "@type": "SiteLinksSearchBox", "potentialAction": { "@type": "SearchAction" } },

        { "@type": "ListItem", "position": 2, "name": "Habilidades Técnicas",  "url": "https://darkangel120.github.io/Portafolio/#skills" },
        { "@type": "ListItem", "position": 3, "name": "Proyectos Destacados",  "url": "https://darkangel120.github.io/Portafolio/#projects" },
        { "@type": "ListItem", "position": 4, "name": "Testimonios",           "url": "https://darkangel120.github.io/Portafolio/#testimonials" },
        { "@type": "ListItem", "position": 5, "name": "Experiencia Laboral",   "url": "https://darkangel120.github.io/Portafolio/#experience" }
      ]
    }

    <!-- ═══════════════════════════════════════════

    <!-- ═══════════════════════════════════════════
         PERFORMANCE (Core Web Vitals → ranking factor)
         preconnect reduce latencia de terceros
         preload de recursos críticos above-the-fold
    ═══════════════════════════════════════════ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
    <link rel="dns-prefetch" href="https://github.com" />
    <link rel="dns-prefetch" href="https://www.linkedin.com" />

    <!-- Preload foto hero (LCP crítico para ranking) -->
    <link rel="preload" as="image" href="assets/img/foto.webp" fetchpriority="high" />

    <!-- Preload CSS crítico -->
    <link rel="preload" as="style" href="assets/css/styles.css" />

    <!-- ═══════════════════════════════════════════
         ESTILOS
    ═══════════════════════════════════════════ -->
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link rel="stylesheet" href="assets/css/modals.css" />
    <link rel="stylesheet" href="assets/css/skeleton-loading.css" />
    <link rel="stylesheet" href="assets/css/project-filter.css" />

    <!-- Icono y manifest -->
    <link rel="icon" href="assets/img/logo.png" type="image/png" />
    <link rel="apple-touch-icon" href="assets/img/logo.png" />

    <!-- Font Awesome (defer para no bloquear render) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" /></noscript>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>

<body>
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen" aria-hidden="true">
        <div class="loading-content">
            <div class="loading-spinner"></div>
        </div>
    </div>

    <header>
        <nav class="navbar" role="navigation" aria-label="Navegación principal">
            <div class="logo">
                <img src="assets/img/logo.png" alt="Logo Darkangel120" width="32" height="32" loading="eager">
                Darkangel120
            </div>
            <ul class="nav-links" id="nav-links" role="list">
                <!-- Contenido dinámico: enlaces de navegación -->
            </ul>
            <div class="menu-toggle" id="menu-toggle" aria-label="Abrir menú" aria-expanded="false" role="button" tabindex="0">
                <i class="fas fa-bars" aria-hidden="true"></i>
            </div>
        </nav>
        <div class="language-switcher" role="navigation" aria-label="Selector de idioma">
            <div class="dropdown">
                <button id="lang-btn" class="lang-btn dropdown-btn" aria-haspopup="listbox" aria-expanded="false">
                    ES <i class="fas fa-chevron-down" aria-hidden="true"></i>
                </button>
                <ul id="lang-list" class="dropdown-list" role="listbox" aria-label="Idiomas disponibles">
                    <li data-lang="es" class="active" role="option" aria-selected="true">ES</li>
                    <li data-lang="en" role="option" aria-selected="false">EN</li>
                </ul>
            </div>
        </div>
    </header>

    <main id="main-content">

        <!-- ── HERO ── -->
        <section id="hero" class="hero" aria-label="Presentación">
            <div class="hero-content">
                <!-- Imagen hero: alt descriptivo + loading eager para LCP -->
                <img
                    src="assets/img/foto.webp"
                    alt="Oswaldo Gómez, desarrollador web freelance"
                    class="hero-photo"
                    width="200"
                    height="200"
                    loading="eager"
                    fetchpriority="high"
                    decoding="async"
                />
                <div class="hero-text">
                    <!-- H1 único y rico en keywords -->
                    <h1 id="hero-name">
                        <span class="name-part first">Oswaldo Gómez</span>
                        <span class="name-part second">Darkangel120</span>
                    </h1>
                    <div>
                        <p class="hero-subtitle">dark_angel_12011@hotmail.com</p>
                    </div>
                    <p class="hero-description">
                        <span id="typed-text" class="typed-text"></span>
                        <br>
                        <span id="hero-description"></span>
                    </p>
                    <div class="hero-contact" role="list" aria-label="Redes y contacto">
                        <a href="https://github.com/Darkangel120"
                           class="contact-link github-link"
                           target="_blank"
                           rel="noopener noreferrer"
                           aria-label="Perfil de GitHub de Oswaldo Gómez"
                           role="listitem">
                            <i class="fab fa-github" aria-hidden="true"></i>
                            <span class="link-text">GitHub</span>
                        </a>
                        <a href="https://www.linkedin.com/in/oswaldo-rafael-g%C3%B3mez-mata-5b6570383?utm_source=share&utm_campaign=share_via&utm_content=profile&utm_medium=android_app"
                           class="contact-link linkedin-link"
                           target="_blank"
                           rel="noopener noreferrer"
                           aria-label="Perfil de LinkedIn de Oswaldo Gómez"
                           role="listitem">
                            <i class="fab fa-linkedin" aria-hidden="true"></i>
                            <span class="link-text">LinkedIn</span>
                        </a>
                        <a href="assets/data/Curriculum - Oswaldo Gómez.pdf"
                           class="contact-link instagram-link"
                           target="_blank"
                           rel="noopener noreferrer"
                           aria-label="Descargar currículum de Oswaldo Gómez en PDF"
                           role="listitem">
                            <i class="fa-regular fa-file" aria-hidden="true"></i>
                            <span class="link-text">Curriculum</span>
                        </a>
                    </div>
                </div>
            </div>
        </section>

        <!-- ── SOBRE MÍ ── -->
        <section id="about" class="section about" aria-labelledby="about-title">
            <h2 id="about-title"><i class="fas fa-user" aria-hidden="true"></i> Sobre mí</h2>
            <!-- Contenido dinámico -->
        </section>

        <!-- ── HABILIDADES ── -->
        <section id="skills" class="section skills" aria-labelledby="skills-title">
            <h2 id="skills-title"><i class="fas fa-tools" aria-hidden="true"></i> Habilidades Técnicas</h2>
            <!-- Contenido dinámico: habilidades -->
        </section>

        <!-- ── PROYECTOS ── -->
        <section id="projects" class="section projects" aria-labelledby="projects-title">
            <h2 id="projects-title"><i class="fas fa-folder-open" aria-hidden="true"></i> Proyectos Destacados</h2>
            <div class="projects-filter">
                <label for="projectFilter"><i class="fas fa-filter" aria-hidden="true"></i> Filtrar por:</label>
                <select id="projectFilter" aria-label="Filtrar proyectos por categoría">
                    <option value="todas">Todas</option>
                </select>
            </div>
            <div class="projects-slider" role="region" aria-label="Slider de proyectos">
                <button class="slider-btn prev-btn" aria-label="Proyecto anterior"><i class="fas fa-chevron-left" aria-hidden="true"></i></button>
                <div class="projects-wrapper" role="list">
                    <!-- Contenido dinámico: proyectos -->
                </div>
                <button class="slider-btn next-btn" aria-label="Proyecto siguiente"><i class="fas fa-chevron-right" aria-hidden="true"></i></button>
                <div class="slider-dots" role="tablist" aria-label="Indicadores de proyectos">
                    <!-- Contenido dinámico: indicadores de slider -->
                </div>
            </div>
        </section>

        <!-- ── TESTIMONIOS ── -->
        <section id="testimonials" class="section testimonials" aria-labelledby="testimonials-title">
            <h2 id="testimonials-title"><i class="fas fa-comments" aria-hidden="true"></i> Testimonios</h2>
            <div class="testimonials-slider" role="region" aria-label="Slider de testimonios">
                <button class="slider-btn prev-btn" aria-label="Testimonio anterior"><i class="fas fa-chevron-left" aria-hidden="true"></i></button>
                <div class="testimonials-wrapper" role="list">
                    <!-- Contenido dinámico: testimonios -->
                </div>
                <button class="slider-btn next-btn" aria-label="Testimonio siguiente"><i class="fas fa-chevron-right" aria-hidden="true"></i></button>
                <div class="slider-dots" role="tablist" aria-label="Indicadores de testimonios">
                    <!-- Contenido dinámico: indicadores de slider -->
                </div>
            </div>
        </section>

        <!-- ── EXPERIENCIA ── -->
        <section id="experience" class="section experience" aria-labelledby="experience-title">
            <h2 id="experience-title"><i class="fas fa-briefcase" aria-hidden="true"></i> Experiencia Laboral</h2>
            <!-- Contenido dinámico -->
        </section>

    </main>

    <!-- Modal Proyecto -->
    <div id="projectModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="projectTitle" hidden>
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="projectTitle">Detalles del Proyecto</h2>
                <div id="projectActions"></div>
                <button class="close" type="button" onclick="closeModal()" aria-label="Cerrar modal">&times;</button>
            </div>
            <div class="modal-body">
                <div id="projectContent" class="project-modal-content">
                    <!-- Contenido dinámico se cargará aquí -->
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Imagen -->
    <div id="imageModal" class="image-modal" role="dialog" aria-modal="true" aria-label="Imagen ampliada" hidden>
        <button class="image-modal-close" type="button" onclick="closeImageModal()" aria-label="Cerrar imagen ampliada">&times;</button>
        <div class="image-modal-content">
            <div class="zoom-controls" role="group" aria-label="Controles de zoom">
                <button id="zoomIn" title="Acercar" aria-label="Acercar imagen">+</button>
                <button id="zoomOut" title="Alejar" aria-label="Alejar imagen">-</button>
                <button id="resetZoom" title="Restablecer" aria-label="Restablecer zoom">Reset</button>
            </div>
            <img id="imageModalImg" src="" alt="" style="cursor: grab;" />
        </div>
    </div>

    <footer role="contentinfo">
        <!-- Contenido dinámico: pie de página -->
    </footer>

    <!-- Back to Top -->
    <button id="back-to-top" class="back-to-top" aria-label="Volver al inicio de la página">
        <i class="fas fa-arrow-up" aria-hidden="true"></i>
    </button>

    <!-- Background Particles -->
    <div id="particles-container" class="particles-container" aria-hidden="true"></div>

    <script src="assets/js/dataLoader.js" defer></script>
    <script src="assets/js/projectFilters.js" defer></script>
    <script src="assets/js/script.js" defer></script>
    <script src="assets/js/modals.js" defer></script>

</body>

</html>
