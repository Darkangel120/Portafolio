<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV – Oswaldo Gómez</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ── BARRA DE CONTROL ── -->
<div class="control-bar">
    <div class="tab-group">
        <button class="tab-btn active" data-cv="americana" onclick="switchCV('americana')">
            <i class="fa-solid fa-flag-usa"></i> Americana
        </button>
        <button class="tab-btn" data-cv="europea" onclick="switchCV('europea')">
            <i class="fa-solid fa-star"></i> Europea
        </button>
    </div>
    <div class="lang-toggle">
        <button class="lang-btn active" id="btnES" onclick="setLang('es')">ES</button>
        <button class="lang-btn" id="btnEN" onclick="setLang('en')">EN</button>
    </div>
</div>

<!-- Los CVs se construyen aquí desde datos.json -->
<div class="cv-wrapper active" id="cv-americana"></div>
<div class="cv-wrapper"        id="cv-europea"></div>

<button class="print-button" onclick="window.print()">
    <i class="fa-solid fa-file-arrow-down"></i>
    <span id="printLabel">Descargar PDF</span>
</button>
<script src="scripts.js"></script>
</body>
</html>
